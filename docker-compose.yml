services:
  postgres:
    image: postgres:16-alpine
    container_name: flowpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flowpilot_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-flowpilot_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flowpilot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6381}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    container_name: flowpilot-api
    restart: unless-stopped
    env_file:
      - .env
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - generated-media:/app/generated_assets

  worker:
    build:
      context: ./backend
    container_name: flowpilot-worker
    restart: unless-stopped
    env_file:
      - .env
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: ./backend
    container_name: flowpilot-scheduler
    restart: unless-stopped
    env_file:
      - .env
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ./dashboard
    container_name: flowpilot-dashboard
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "4173"
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    container_name: flowpilot-nginx
    restart: unless-stopped
    depends_on:
      - api
      - dashboard
    ports:
      - "${NGINX_PORT:-3090}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - generated-media:/app/generated_assets:ro

volumes:
  postgres-data:
  redis-data:
  generated-media:
